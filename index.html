<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ইলেকশন ব্যানার জেনারেটর</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-shadow: 0 0 15px #00ffcc;
    }
    .upload-area {
      border: 3px dashed #00ffcc;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 30px;
      transition: 0.3s;
    }
    .upload-area:hover { background: rgba(0, 255, 204, 0.1); }
    
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
    }
    input, select, button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
    }
    input, select { background: #1a2a3a; color: white; }
    button {
      background: #00cc99;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover { background: #00ffaa; transform: scale(1.05); }

    .banners-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 25px;
      margin-top: 30px;
    }
    .banner-container {
      background: #112233;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    canvas {
      width: 100%;
      border: 2px solid #00ffcc;
      border-radius: 8px;
      cursor: pointer;
    }
    .download-all {
      text-align: center;
      margin: 30px 0;
    }
    .info {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗳️ ইলেকশন ব্যানার জেনারেটর</h1>
    
    <div class="upload-area" id="uploadArea">
      <h2>ছবি আপলোড করুন</h2>
      <p>ক্লিক করুন বা ড্র্যাগ করে ছবি দিন</p>
      <input type="file" id="imageInput" accept="image/*" hidden>
    </div>

    <div class="controls">
      <div>
        <label>প্রার্থীর নাম</label><br>
        <input type="text" id="name" value="মোঃ রহিম উদ্দিন" placeholder="প্রার্থীর নাম">
      </div>
      <div>
        <label>পদবী / প্রতীক</label><br>
        <input type="text" id="position" value="চেয়ারম্যান প্রার্থী" placeholder="পদবী">
      </div>
      <div>
        <label>দল / স্লোগান</label><br>
        <input type="text" id="party" value="নৌকা মার্কা" placeholder="দল বা স্লোগান">
      </div>
      <div>
        <label>টেমপ্লেট সিলেক্ট করুন</label><br>
        <select id="templateSelect">
          <option value="all">সব টেমপ্লেট</option>
          <option value="vertical">ভার্টিক্যাল ব্যানার</option>
          <option value="horizontal">হরাইজন্টাল ব্যানার</option>
          <option value="square">স্কয়ার পোস্টার</option>
        </select>
      </div>
      <div>
        <button onclick="generateAllBanners()">🎨 সব ব্যানার তৈরি করুন</button>
      </div>
    </div>

    <div class="banners-grid" id="bannersGrid"></div>

    <div class="download-all">
      <button onclick="downloadAll()">📥 সব ব্যানার একসাথে ডাউনলোড করুন</button>
    </div>
  </div>

  <script>
    let uploadedImage = null;
    let currentBanners = [];

    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');

    uploadArea.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', handleImageUpload);

    // Drag and drop
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = '#00ff00'; });
    uploadArea.addEventListener('dragleave', () => uploadArea.style.borderColor = '#00ffcc');
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.style.borderColor = '#00ffcc';
      if (e.dataTransfer.files.length > 0) {
        handleImage(e.dataTransfer.files[0]);
      }
    });

    function handleImageUpload(e) {
      if (e.target.files.length > 0) {
        handleImage(e.target.files[0]);
      }
    }

    function handleImage(file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          uploadedImage = img;
          alert('✅ ছবি আপলোড হয়েছে! এখন ব্যানার তৈরি করুন।');
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    function createCanvas(width, height, title) {
      const container = document.createElement('div');
      container.className = 'banner-container';
      
      const label = document.createElement('h3');
      label.textContent = title;
      label.style.textAlign = 'center';
      label.style.marginBottom = '10px';
      
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      
      container.appendChild(label);
      container.appendChild(canvas);
      return { container, canvas };
    }

    function drawBanner(canvas, name, position, party) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;

      // Background
      const gradient = ctx.createLinearGradient(0, 0, 0, h);
      gradient.addColorStop(0, '#003087');
      gradient.addColorStop(1, '#0066cc');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, w, h);

      // Border
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 15;
      ctx.strokeRect(10, 10, w-20, h-20);

      // Image
      if (uploadedImage) {
        const imgAspect = uploadedImage.width / uploadedImage.height;
        let imgW = w * 0.55;
        let imgH = imgW / imgAspect;
        
        if (imgH > h * 0.65) {
          imgH = h * 0.65;
          imgW = imgH * imgAspect;
        }

        const x = (w - imgW) / 2;
        const y = 80;
        
        ctx.save();
        ctx.shadowColor = 'black';
        ctx.shadowBlur = 20;
        ctx.shadowOffsetX = 5;
        ctx.shadowOffsetY = 5;
        ctx.drawImage(uploadedImage, x, y, imgW, imgH);
        ctx.restore();
      }

      // Text
      ctx.fillStyle = 'white';
      ctx.textAlign = 'center';
      
      // Name
      ctx.font = 'bold 48px Arial';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 10;
      ctx.fillText(name, w/2, h - 140);
      
      // Position
      ctx.font = 'bold 32px Arial';
      ctx.fillStyle = '#ffd700';
      ctx.fillText(position, w/2, h - 90);
      
      // Party
      ctx.font = 'bold 38px Arial';
      ctx.fillStyle = '#ffff00';
      ctx.fillText(party, w/2, h - 45);

      // Small flag effect
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(w-80, 30, 50, 30);
      ctx.fillStyle = '#00ff00';
      ctx.fillRect(w-80, 60, 50, 30);
    }

    function generateAllBanners() {
      if (!uploadedImage) {
        alert('প্রথমে একটা ছবি আপলোড করুন!');
        return;
      }

      const name = document.getElementById('name').value || "প্রার্থী";
      const position = document.getElementById('position').value || "প্রার্থী";
      const party = document.getElementById('party').value || "নৌকা মার্কা";

      const grid = document.getElementById('bannersGrid');
      grid.innerHTML = '';
      currentBanners = [];

      // Template 1: Vertical Large
      let {container, canvas} = createCanvas(600, 800, "ভার্টিক্যাল বড় ব্যানার");
      drawBanner(canvas, name, position, party);
      grid.appendChild(container);
      currentBanners.push({canvas, name: "vertical_large"});

      // Template 2: Horizontal Banner
      let {container: c2, canvas: canvas2} = createCanvas(900, 400, "হরাইজন্টাল ব্যানার");
      drawBanner(canvas2, name, position, party);
      grid.appendChild(c2);
      currentBanners.push({canvas: canvas2, name: "horizontal"});

      // Template 3: Square Poster
      let {container: c3, canvas: canvas3} = createCanvas(600, 600, "স্কয়ার পোস্টার");
      drawBanner(canvas3, name, position, party);
      grid.appendChild(c3);
      currentBanners.push({canvas: canvas3, name: "square"});

      // Template 4: Small Vertical
      let {container: c4, canvas: canvas4} = createCanvas(400, 550, "ছোট ভার্টিক্যাল");
      drawBanner(canvas4, name, position, party);
      grid.appendChild(c4);
      currentBanners.push({canvas: canvas4, name: "small_vertical"});
    }

    function downloadAll() {
      if (currentBanners.length === 0) {
        alert('প্রথমে ব্যানার তৈরি করুন!');
        return;
      }
      
      currentBanners.forEach((item, index) => {
        const link = document.createElement('a');
        link.download = `\( {item.name}_banner_ \){index+1}.png`;
        link.href = item.canvas.toDataURL('image/png');
        link.click();
      });
    }

    // Initial demo image (optional)
    window.onload = () => {
      console.log("%cইলেকশন ব্যানার জেনারেটর রেডি!", "color: #00ffcc; font-size: 16px;");
    };
  </script>
</body>
</html>
